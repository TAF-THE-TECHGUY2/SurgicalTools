# ===========================================================================
# Production overrides for EC2. Merge with the base compose file:
#   docker compose -f docker-compose.yml -f deploy/docker-compose.prod.yml up -d --build
#
# Values are read from the repo-root .env (created by deploy/deploy.sh):
#   APP_KEY, APP_URL, DB_PASSWORD, MAIL_*, AWS_* (optional)
#
# Differences from dev:
#   - APP_ENV=production, APP_DEBUG=false, no demo seed on boot
#   - Postgres + backend are NOT published to the host (only reachable on the
#     internal docker network); the frontend (nginx) is the only public service
#   - adds a queue worker + scheduler so emails and daily alerts actually run
#   - restart: unless-stopped everywhere
# ===========================================================================

x-backend-env: &backend-env
  APP_NAME: "Surgical Devices ERP"
  APP_ENV: production
  APP_KEY: ${APP_KEY}
  APP_DEBUG: "false"
  APP_URL: ${APP_URL}
  FRONTEND_URL: ${APP_URL}
  LOG_CHANNEL: stack
  DB_CONNECTION: pgsql
  DB_HOST: db
  DB_PORT: "5432"
  DB_DATABASE: surgical_erp
  DB_USERNAME: surgical
  DB_PASSWORD: ${DB_PASSWORD}
  CACHE_STORE: file
  SESSION_DRIVER: file
  QUEUE_CONNECTION: database
  FILESYSTEM_DISK: ${FILESYSTEM_DISK:-local}
  MAIL_MAILER: ${MAIL_MAILER:-log}
  MAIL_HOST: ${MAIL_HOST:-mailpit}
  MAIL_PORT: ${MAIL_PORT:-1025}
  MAIL_USERNAME: ${MAIL_USERNAME:-}
  MAIL_PASSWORD: ${MAIL_PASSWORD:-}
  MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-no-reply@surgicaldevices.example}
  AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
  AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
  AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-eu-west-1}
  AWS_BUCKET: ${AWS_BUCKET:-}
  SEED_ON_BOOT: "false"

services:
  db:
    environment:
      POSTGRES_DB: surgical_erp
      POSTGRES_USER: surgical
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports: []
    restart: unless-stopped

  mailpit:
    restart: unless-stopped

  backend:
    environment:
      <<: *backend-env
      RUN_MIGRATIONS: "true"   # the web container owns migrations
    ports: []
    restart: unless-stopped

  queue:
    build:
      context: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      <<: *backend-env
      RUN_MIGRATIONS: "false"
    command: ["php", "artisan", "queue:work", "--tries=3", "--sleep=3", "--max-time=3600"]
    volumes:
      - storage_data:/app/storage
    restart: unless-stopped

  scheduler:
    build:
      context: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      <<: *backend-env
      RUN_MIGRATIONS: "false"
    command: ["php", "artisan", "schedule:work"]
    volumes:
      - storage_data:/app/storage
    restart: unless-stopped

  frontend:
    ports:
      - "80:80"
    restart: unless-stopped
